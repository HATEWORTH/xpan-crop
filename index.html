<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XPan Crop</title>
<style>
  :root {
    --bg: #111;
    --panel: #1b1b1b;
    --fg: #eee;
    --muted: #888;
    --accent: #e8b84a;
    --border: #2a2a2a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 14px;
  }
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
  }
  header, footer {
    padding: 10px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  footer {
    border-top: 1px solid var(--border);
    border-bottom: none;
  }
  h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0 6px 0 0;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  main {
    position: relative;
    overflow: hidden;
    background: #0a0a0a;
  }
  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: var(--muted);
    text-align: center;
    padding: 40px;
    pointer-events: none;
    gap: 8px;
  }
  main.dragover::after {
    content: "Drop image to load";
    position: absolute;
    inset: 12px;
    border: 2px dashed var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    background: rgba(232,184,74,0.06);
    pointer-events: none;
    z-index: 10;
  }
  button, label.btn, select {
    background: #2a2a2a;
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover, label.btn:hover, select:hover { background: #333; }
  button.primary {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.primary:hover { background: #f3c45a; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.icon { padding: 4px 10px; font-size: 14px; min-width: 28px; }
  input[type=file] { display: none; }
  .info {
    color: var(--muted);
    font-size: 12px;
    font-family: ui-monospace, Consolas, monospace;
  }
  .spacer { flex: 1; }
  .divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 4px;
  }
  .field {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .field input[type=number] {
    width: 54px;
    background: #0d0d0d;
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 6px;
    font-family: ui-monospace, Consolas, monospace;
  }
  kbd {
    background: #222;
    border: 1px solid #333;
    border-radius: 3px;
    padding: 1px 5px;
    font-family: ui-monospace, Consolas, monospace;
    font-size: 11px;
  }
  .warn { color: #e88a4a; }
</style>
</head>
<body>

<header>
  <h1>XPAN CROP</h1>
  <label class="btn" for="file">Open image</label>
  <input type="file" id="file" accept="image/jpeg,image/png,image/tiff,.tif,.tiff">

  <div class="field">
    <span>Preset</span>
    <select id="preset">
      <option value="65:24" selected>XPan (65:24)</option>
      <option value="3:2">3:2 (35mm)</option>
      <option value="4:3">4:3</option>
      <option value="1:1">Square 1:1</option>
      <option value="16:9">16:9</option>
      <option value="4:5">4:5 (Portrait)</option>
      <option value="5:4">5:4 (8×10)</option>
      <option value="2.35:1">2.35:1 Cinemascope</option>
      <option value="2.39:1">2.39:1 Anamorphic</option>
      <option value="7:6">7:6 (6×7 landscape)</option>
      <option value="6:7">6:7 (6×7 portrait)</option>
      <option value="custom">Custom</option>
    </select>
  </div>
  <div class="field">
    <input type="number" id="arW" value="65" min="1" step="1">
    <span>:</span>
    <input type="number" id="arH" value="24" min="1" step="1">
  </div>

  <button id="center">Center</button>
  <button id="matteBtn">Matte: Off</button>

  <span class="divider"></span>
  <button id="zoomOut" class="icon" title="Zoom out (−)">−</button>
  <span class="info" id="zoomLabel" style="min-width:46px; text-align:center;">—</span>
  <button id="zoomIn" class="icon" title="Zoom in (+)">+</button>
  <button id="fitBtn" title="Fit to window (0)">Fit</button>

  <div class="spacer"></div>
  <span class="info" id="info">no image loaded</span>
</header>

<main>
  <canvas id="canvas"></canvas>
  <div class="empty" id="empty">
    <div>Drop an image here, or click <b>Open image</b>.</div>
    <div style="font-size:12px">PNG / TIFF / JPEG — 8-bit &amp; 16-bit supported</div>
    <div style="font-size:12px">
      drag to move · wheel to zoom · <kbd>space</kbd>+drag to pan ·
      <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> nudge · <kbd>Shift</kbd> = 10px
    </div>
  </div>
</main>

<footer>
  <span class="info" id="cropInfo">—</span>
  <span class="info" id="exportNote"></span>
  <div class="spacer"></div>
  <button id="exportBtn" class="primary" disabled>Export</button>
</footer>

<script>
(() => {
  // ===== DOM =====
  const fileInput = document.getElementById('file');
  const canvas    = document.getElementById('canvas');
  const emptyEl   = document.getElementById('empty');
  const info      = document.getElementById('info');
  const cropInfo  = document.getElementById('cropInfo');
  const exportNote= document.getElementById('exportNote');
  const presetSel = document.getElementById('preset');
  const arW       = document.getElementById('arW');
  const arH       = document.getElementById('arH');
  const centerBtn = document.getElementById('center');
  const matteBtn  = document.getElementById('matteBtn');
  const exportBtn = document.getElementById('exportBtn');
  const zoomInBtn = document.getElementById('zoomIn');
  const zoomOutBtn= document.getElementById('zoomOut');
  const zoomLabel = document.getElementById('zoomLabel');
  const fitBtn    = document.getElementById('fitBtn');
  const mainEl    = document.querySelector('main');
  const ctx       = canvas.getContext('2d');

  // ===== Constants =====
  const MATTE_PX = 20;
  const PRESETS = {
    '65:24':  { w: 65,  h: 24  },
    '3:2':    { w: 3,   h: 2   },
    '4:3':    { w: 4,   h: 3   },
    '1:1':    { w: 1,   h: 1   },
    '16:9':   { w: 16,  h: 9   },
    '4:5':    { w: 4,   h: 5   },
    '5:4':    { w: 5,   h: 4   },
    '2.35:1': { w: 235, h: 100 },
    '2.39:1': { w: 239, h: 100 },
    '7:6':    { w: 7,   h: 6   },
    '6:7':    { w: 6,   h: 7   },
  };

  // ===== State =====
  let matteOn = false;
  let source  = null;
  let cropN   = { top: 0, left: 0, bottom: 1, right: 1 };
  let view    = { scale: 1, ox: 0, oy: 0, fitScale: 1 };

  let dragMode  = null;
  let dragStart = null;
  let spaceHeld = false;
  let suppressInput = false;

  // ===== Lazy library loader =====
  const libs = {};
  function loadScript(url) {
    if (libs[url]) return libs[url];
    libs[url] = new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = url;
      s.onload  = res;
      s.onerror = () => rej(new Error('Failed to load ' + url));
      document.head.appendChild(s);
    });
    return libs[url];
  }
  const ensurePako = () => loadScript('https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js');
  const ensureUTIF = async () => { await ensurePako(); await loadScript('https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js'); };
  const ensureUPNG = async () => { await ensurePako(); await loadScript('https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.js'); };

  // ===== Format / bit-depth detection =====
  function detectFormat(h) {
    if (h[0] === 0xFF && h[1] === 0xD8 && h[2] === 0xFF) return 'jpeg';
    if (h[0] === 0x89 && h[1] === 0x50 && h[2] === 0x4E && h[3] === 0x47) return 'png';
    if ((h[0] === 0x49 && h[1] === 0x49 && h[2] === 0x2A && h[3] === 0x00) ||
        (h[0] === 0x4D && h[1] === 0x4D && h[2] === 0x00 && h[3] === 0x2A)) return 'tiff';
    return null;
  }
  function pngInfo(buf) {
    const dv = new DataView(buf);
    return {
      width:     dv.getUint32(16),
      height:    dv.getUint32(20),
      bitDepth:  dv.getUint8(24),
      colorType: dv.getUint8(25),
    };
  }

  // ===== File load =====
  async function loadFile(f) {
    if (!f) return;
    try {
      info.textContent = `loading ${f.name}…`;
      const buffer = await f.arrayBuffer();
      const header = new Uint8Array(buffer, 0, Math.min(32, buffer.byteLength));
      const type   = detectFormat(header);
      if (!type) { info.textContent = `unsupported format: ${f.name}`; return; }

      const src = { file: f, name: f.name, type, buffer, bitDepth: 8, w: 0, h: 0, tiffIFD: null, isLE: true };

      if (type === 'tiff') {
        src.isLE = header[0] === 0x49;
        await ensureUTIF();
        const ifds = UTIF.decode(buffer);
        if (!ifds || !ifds.length) throw new Error('no IFDs in TIFF');
        const ifd = ifds[0];
        UTIF.decodeImage(buffer, ifd, ifds);
        src.tiffIFD  = ifd;
        src.w = ifd.width;
        src.h = ifd.height;
        const bps = ifd.t258 || [8];
        src.bitDepth = bps[0] || 8;

        const rgba = UTIF.toRGBA8(ifd);
        const pc = document.createElement('canvas');
        pc.width = src.w; pc.height = src.h;
        pc.getContext('2d').putImageData(
          new ImageData(new Uint8ClampedArray(rgba.buffer, rgba.byteOffset, rgba.byteLength), src.w, src.h),
          0, 0
        );
        src.preview = pc;

      } else if (type === 'png') {
        src.bitDepth = pngInfo(buffer).bitDepth;
        const bitmap = await createImageBitmap(f);
        src.w = bitmap.width; src.h = bitmap.height;
        src.preview = bitmap;

      } else if (type === 'jpeg') {
        src.bitDepth = 8;
        const bitmap = await createImageBitmap(f);
        src.w = bitmap.width; src.h = bitmap.height;
        src.preview = bitmap;
      }

      source = src;
      emptyEl.hidden = true;
      exportBtn.disabled = false;

      const depthTag = src.bitDepth ? ` ${src.bitDepth}-bit` : '';
      info.textContent = `${f.name}  ${src.w} × ${src.h}  ·  ${type.toUpperCase()}${depthTag}`;
      exportBtn.textContent = `Export ${type === 'jpeg' ? 'JPEG' : type.toUpperCase()}`;
      exportNote.textContent = type === 'jpeg'
        ? 'JPEG re-encoded (use PNG/TIFF from Lightroom for lossless)'
        : '';
      exportNote.className = 'info' + (type === 'jpeg' ? ' warn' : '');

      recomputeCrop(true);
      resizeCanvas();
      fitView();
      render();
    } catch (err) {
      console.error(err);
      info.textContent = `failed to load ${f.name}: ${err.message || err}`;
    }
  }

  // ===== Crop math =====
  function computeFitCrop(targetAspect) {
    const sA = source.w / source.h;
    if (targetAspect >= sA) {
      const hFrac = sA / targetAspect;
      const cut = (1 - hFrac) / 2;
      return { left: 0, right: 1, top: cut, bottom: 1 - cut };
    } else {
      const wFrac = targetAspect / sA;
      const cut = (1 - wFrac) / 2;
      return { top: 0, bottom: 1, left: cut, right: 1 - cut };
    }
  }
  function recomputeCrop(centerIt) {
    if (!source) return;
    const a = Math.max(1, +arW.value) / Math.max(1, +arH.value);
    const fit = computeFitCrop(a);
    if (centerIt) {
      cropN = fit;
    } else {
      const cur = cropN;
      if (fit.top > 0) {
        const h = fit.bottom - fit.top;
        const midY = (cur.top + cur.bottom) / 2;
        const t = Math.max(0, Math.min(1 - h, midY - h / 2));
        cropN = { left: 0, right: 1, top: t, bottom: t + h };
      } else {
        const w = fit.right - fit.left;
        const midX = (cur.left + cur.right) / 2;
        const l = Math.max(0, Math.min(1 - w, midX - w / 2));
        cropN = { top: 0, bottom: 1, left: l, right: l + w };
      }
    }
  }

  // ===== View (zoom + pan) =====
  function resizeCanvas() {
    const r = canvas.getBoundingClientRect();
    canvas.width  = Math.max(1, Math.floor(r.width  * devicePixelRatio));
    canvas.height = Math.max(1, Math.floor(r.height * devicePixelRatio));
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  function cssSize() {
    const r = canvas.getBoundingClientRect();
    return { w: r.width, h: r.height };
  }
  function fitView() {
    if (!source) return;
    const cs = cssSize();
    const pad = 20;
    const s = Math.min((cs.w - pad * 2) / source.w, (cs.h - pad * 2) / source.h);
    view.fitScale = s;
    view.scale    = s;
    view.ox = (cs.w - source.w * s) / 2;
    view.oy = (cs.h - source.h * s) / 2;
    updateZoomLabel();
  }
  function setZoom(newScale, cx, cy) {
    if (!source) return;
    newScale = Math.max(view.fitScale * 0.5, Math.min(32, newScale));
    const cs = cssSize();
    if (cx == null) { cx = cs.w / 2; cy = cs.h / 2; }
    const sx = (cx - view.ox) / view.scale;
    const sy = (cy - view.oy) / view.scale;
    view.scale = newScale;
    view.ox = cx - sx * newScale;
    view.oy = cy - sy * newScale;
    updateZoomLabel();
    render();
  }
  function updateZoomLabel() {
    if (!source) { zoomLabel.textContent = '—'; return; }
    zoomLabel.textContent = Math.round((view.scale / view.fitScale) * 100) + '%';
  }

  // ===== Rendering =====
  function render() {
    const cs = cssSize();
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, cs.w, cs.h);
    if (!source) return;

    const imgW = source.w * view.scale;
    const imgH = source.h * view.scale;
    ctx.imageSmoothingEnabled = view.scale < 1;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(source.preview, view.ox, view.oy, imgW, imgH);

    const cx = view.ox + cropN.left * imgW;
    const cy = view.oy + cropN.top  * imgH;
    const cw = (cropN.right  - cropN.left) * imgW;
    const ch = (cropN.bottom - cropN.top)  * imgH;

    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, cs.w, cy);
    ctx.fillRect(0, cy + ch, cs.w, cs.h - (cy + ch));
    ctx.fillRect(0, cy, cx, ch);
    ctx.fillRect(cx + cw, cy, cs.w - (cx + cw), ch);

    if (matteOn) {
      const m = MATTE_PX * view.scale;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(cx - m, cy - m, cw + m * 2, m);
      ctx.fillRect(cx - m, cy + ch, cw + m * 2, m);
      ctx.fillRect(cx - m, cy, m, ch);
      ctx.fillRect(cx + cw, cy, m, ch);
    }

    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 1;
    ctx.strokeRect(cx + 0.5, cy + 0.5, cw - 1, ch - 1);

    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(cx, cy + ch / 3);     ctx.lineTo(cx + cw, cy + ch / 3);
    ctx.moveTo(cx, cy + 2 * ch / 3); ctx.lineTo(cx + cw, cy + 2 * ch / 3);
    ctx.moveTo(cx + cw / 3, cy);     ctx.lineTo(cx + cw / 3, cy + ch);
    ctx.moveTo(cx + 2 * cw / 3, cy); ctx.lineTo(cx + 2 * cw / 3, cy + ch);
    ctx.stroke();
    ctx.setLineDash([]);

    updateCropInfo();
  }
  function updateCropInfo() {
    if (!source) { cropInfo.textContent = '—'; return; }
    const pw = Math.round((cropN.right - cropN.left) * source.w);
    const ph = Math.round((cropN.bottom - cropN.top) * source.h);
    const f = n => n.toFixed(4);
    cropInfo.textContent = `crop ${pw} × ${ph}  ·  L ${f(cropN.left)}  T ${f(cropN.top)}  R ${f(cropN.right)}  B ${f(cropN.bottom)}`;
  }

  // ===== Interaction =====
  function hitCrop(cx, cy) {
    if (!source) return false;
    const imgW = source.w * view.scale, imgH = source.h * view.scale;
    const x = view.ox + cropN.left * imgW;
    const y = view.oy + cropN.top  * imgH;
    const w = (cropN.right - cropN.left) * imgW;
    const h = (cropN.bottom - cropN.top) * imgH;
    return cx >= x && cx <= x + w && cy >= y && cy <= y + h;
  }
  function moveCropBy(dxN, dyN, baseline = cropN) {
    const w = baseline.right - baseline.left;
    const h = baseline.bottom - baseline.top;
    let left = baseline.left, top = baseline.top;
    if (w < 0.9999) left = Math.max(0, Math.min(1 - w, baseline.left + dxN));
    if (h < 0.9999) top  = Math.max(0, Math.min(1 - h, baseline.top  + dyN));
    cropN = { left, top, right: left + w, bottom: top + h };
    render();
  }

  canvas.addEventListener('pointerdown', e => {
    if (!source) return;
    canvas.setPointerCapture(e.pointerId);
    const r = canvas.getBoundingClientRect();
    const cx = e.clientX - r.left;
    const cy = e.clientY - r.top;
    const wantPan = spaceHeld || e.button === 1 || e.button === 2;
    if (!wantPan && e.button === 0 && hitCrop(cx, cy)) {
      dragMode = 'crop';
      dragStart = { x: cx, y: cy, base: { ...cropN } };
    } else {
      dragMode = 'pan';
      dragStart = { x: cx, y: cy, ox: view.ox, oy: view.oy };
    }
    canvas.style.cursor = 'grabbing';
  });
  canvas.addEventListener('pointermove', e => {
    const r = canvas.getBoundingClientRect();
    const cx = e.clientX - r.left;
    const cy = e.clientY - r.top;
    if (!dragMode) {
      if (source) {
        const over = hitCrop(cx, cy);
        canvas.style.cursor = spaceHeld ? 'grab' : (over ? 'grab' : 'default');
      }
      return;
    }
    if (dragMode === 'crop') {
      const imgW = source.w * view.scale, imgH = source.h * view.scale;
      moveCropBy((cx - dragStart.x) / imgW, (cy - dragStart.y) / imgH, dragStart.base);
    } else {
      view.ox = dragStart.ox + (cx - dragStart.x);
      view.oy = dragStart.oy + (cy - dragStart.y);
      render();
    }
  });
  const endDrag = () => {
    dragMode = null;
    canvas.style.cursor = spaceHeld ? 'grab' : 'default';
  };
  canvas.addEventListener('pointerup',    endDrag);
  canvas.addEventListener('pointercancel', endDrag);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  canvas.addEventListener('wheel', e => {
    if (!source) return;
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const cx = e.clientX - r.left;
    const cy = e.clientY - r.top;
    const factor = Math.exp(-e.deltaY * 0.0015);
    setZoom(view.scale * factor, cx, cy);
  }, { passive: false });

  // Keyboard
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.code === 'Space' && !spaceHeld) {
      spaceHeld = true;
      if (!dragMode) canvas.style.cursor = 'grab';
      e.preventDefault();
    }
    if (!source) return;
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
      e.preventDefault();
      const step = (e.shiftKey ? 10 : 1) / Math.max(source.w, source.h);
      if (e.key === 'ArrowLeft')  moveCropBy(-step, 0);
      if (e.key === 'ArrowRight') moveCropBy( step, 0);
      if (e.key === 'ArrowUp')    moveCropBy(0, -step);
      if (e.key === 'ArrowDown')  moveCropBy(0,  step);
    }
    if (e.key === '+' || e.key === '=') setZoom(view.scale * 1.25);
    if (e.key === '-' || e.key === '_') setZoom(view.scale / 1.25);
    if (e.key === '0') { fitView(); render(); }
  });
  window.addEventListener('keyup', e => {
    if (e.code === 'Space') {
      spaceHeld = false;
      if (!dragMode) canvas.style.cursor = 'default';
    }
  });

  // Buttons
  zoomInBtn.addEventListener('click',  () => setZoom(view.scale * 1.25));
  zoomOutBtn.addEventListener('click', () => setZoom(view.scale / 1.25));
  fitBtn.addEventListener('click',     () => { fitView(); render(); });
  centerBtn.addEventListener('click',  () => { recomputeCrop(true); render(); });
  matteBtn.addEventListener('click',   () => {
    matteOn = !matteOn;
    matteBtn.textContent = 'Matte: ' + (matteOn ? 'On' : 'Off');
    render();
  });

  // Presets
  presetSel.addEventListener('change', () => {
    const v = presetSel.value;
    if (v === 'custom') return;
    const p = PRESETS[v];
    if (!p) return;
    suppressInput = true;
    arW.value = p.w; arH.value = p.h;
    suppressInput = false;
    recomputeCrop(false);
    render();
  });
  const onCustomEdit = () => {
    if (suppressInput) return;
    presetSel.value = 'custom';
    recomputeCrop(false);
    render();
  };
  arW.addEventListener('input', onCustomEdit);
  arH.addEventListener('input', onCustomEdit);

  // Drag & drop
  let dragDepth = 0;
  const hasFiles = e => e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files');
  window.addEventListener('dragenter', e => { if (!hasFiles(e)) return; e.preventDefault(); dragDepth++; mainEl.classList.add('dragover'); });
  window.addEventListener('dragover',  e => { if (!hasFiles(e)) return; e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
  window.addEventListener('dragleave', e => { if (!hasFiles(e)) return; dragDepth = Math.max(0, dragDepth - 1); if (!dragDepth) mainEl.classList.remove('dragover'); });
  window.addEventListener('drop',      e => {
    if (!hasFiles(e)) return;
    e.preventDefault();
    dragDepth = 0;
    mainEl.classList.remove('dragover');
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) loadFile(f);
  });
  fileInput.addEventListener('change', () => loadFile(fileInput.files[0]));

  window.addEventListener('resize', () => {
    resizeCanvas();
    if (source) fitView();
    render();
  });

  // ===== EXPORT =====
  exportBtn.addEventListener('click', async () => {
    if (!source) return;
    exportBtn.disabled = true;
    const prevLabel = exportBtn.textContent;
    exportBtn.textContent = 'Exporting…';
    try {
      const sx = Math.round(cropN.left * source.w);
      const sy = Math.round(cropN.top  * source.h);
      const sw = Math.round((cropN.right  - cropN.left) * source.w);
      const sh = Math.round((cropN.bottom - cropN.top)  * source.h);
      const pad = matteOn ? MATTE_PX : 0;
      const base = source.name.replace(/\.[^.]+$/, '');
      const ratioLabel = `${+arW.value}x${+arH.value}`;
      const matteTag = matteOn ? '_matte' : '';

      let blob, ext;
      if (source.type === 'png' && source.bitDepth === 16) {
        await ensureUPNG();
        blob = await exportPng16(sx, sy, sw, sh, pad);
        ext = 'png';
      } else if (source.type === 'png') {
        blob = await exportPng8(sx, sy, sw, sh, pad);
        ext = 'png';
      } else if (source.type === 'tiff' && source.bitDepth === 16) {
        blob = await exportTiff16(sx, sy, sw, sh, pad);
        ext = 'tif';
      } else if (source.type === 'tiff') {
        await ensureUTIF();
        blob = await exportTiff8(sx, sy, sw, sh, pad);
        ext = 'tif';
      } else {
        blob = await exportJpeg(sx, sy, sw, sh, pad);
        ext = 'jpg';
      }

      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${base}_xpan_${ratioLabel}${matteTag}.${ext}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    } catch (err) {
      console.error(err);
      info.textContent = `export failed: ${err.message || err}`;
    } finally {
      exportBtn.disabled = false;
      exportBtn.textContent = prevLabel;
    }
  });

  async function exportPng8(sx, sy, sw, sh, pad) {
    const c = document.createElement('canvas');
    c.width  = sw + pad * 2;
    c.height = sh + pad * 2;
    const cx = c.getContext('2d');
    cx.imageSmoothingEnabled = false;
    if (pad) { cx.fillStyle = '#ffffff'; cx.fillRect(0, 0, c.width, c.height); }
    cx.drawImage(source.preview, sx, sy, sw, sh, pad, pad, sw, sh);
    return await new Promise(r => c.toBlob(r, 'image/png'));
  }

  async function exportPng16(sx, sy, sw, sh, pad) {
    const decoded = UPNG.decode(source.buffer);
    if (decoded.depth !== 16) return exportPng8(sx, sy, sw, sh, pad);
    const rgba16 = upngToRGBA16(decoded);
    const outW = sw + pad * 2;
    const outH = sh + pad * 2;
    const out = new Uint8Array(outW * outH * 8);
    if (pad) out.fill(0xFF);
    const srcStride = decoded.width * 8;
    const dstStride = outW * 8;
    for (let y = 0; y < sh; y++) {
      const srcOff = (sy + y) * srcStride + sx * 8;
      const dstOff = (y + pad) * dstStride + pad * 8;
      out.set(rgba16.subarray(srcOff, srcOff + sw * 8), dstOff);
    }
    const png = UPNG.encodeLL([out.buffer], outW, outH, 3, 1, 16);
    return new Blob([png], { type: 'image/png' });
  }

  function upngToRGBA16(img) {
    const w = img.width, h = img.height, ct = img.ctype;
    const spp = { 0:1, 2:3, 3:1, 4:2, 6:4 }[ct];
    if (!spp) throw new Error('Unsupported PNG color type: ' + ct);
    const data = new Uint8Array(img.data);
    const n = w * h;
    const samples = new Uint16Array(n * spp);
    for (let i = 0; i < samples.length; i++) samples[i] = (data[i*2] << 8) | data[i*2+1];
    const out = new Uint8Array(n * 8);
    let o = 0;
    const wr = v => { out[o++] = (v >> 8) & 0xFF; out[o++] = v & 0xFF; };
    if (ct === 2) {
      for (let i = 0, si = 0; i < n; i++) { wr(samples[si++]); wr(samples[si++]); wr(samples[si++]); wr(0xFFFF); }
    } else if (ct === 6) {
      for (let i = 0, si = 0; i < n; i++) { wr(samples[si++]); wr(samples[si++]); wr(samples[si++]); wr(samples[si++]); }
    } else if (ct === 0) {
      for (let i = 0, si = 0; i < n; i++) { const g = samples[si++]; wr(g); wr(g); wr(g); wr(0xFFFF); }
    } else if (ct === 4) {
      for (let i = 0, si = 0; i < n; i++) { const g = samples[si++], a = samples[si++]; wr(g); wr(g); wr(g); wr(a); }
    } else {
      throw new Error('Unsupported PNG color type for 16-bit: ' + ct);
    }
    return out;
  }

  async function exportTiff8(sx, sy, sw, sh, pad) {
    const c = document.createElement('canvas');
    c.width  = sw + pad * 2;
    c.height = sh + pad * 2;
    const cx = c.getContext('2d');
    cx.imageSmoothingEnabled = false;
    if (pad) { cx.fillStyle = '#ffffff'; cx.fillRect(0, 0, c.width, c.height); }
    cx.drawImage(source.preview, sx, sy, sw, sh, pad, pad, sw, sh);
    const id = cx.getImageData(0, 0, c.width, c.height);
    const tiff = UTIF.encodeImage(id.data.buffer, c.width, c.height);
    return new Blob([tiff], { type: 'image/tiff' });
  }

  async function exportTiff16(sx, sy, sw, sh, pad) {
    const rgba16 = tiffTo16RGBA(source.tiffIFD, source.isLE);
    const outW = sw + pad * 2;
    const outH = sh + pad * 2;
    const rgb16 = new Uint16Array(outW * outH * 3);
    if (pad) rgb16.fill(0xFFFF);
    const srcW = source.w;
    for (let y = 0; y < sh; y++) {
      for (let x = 0; x < sw; x++) {
        const si = ((sy + y) * srcW + (sx + x)) * 4;
        const di = ((y + pad) * outW + (x + pad)) * 3;
        rgb16[di]     = rgba16[si];
        rgb16[di + 1] = rgba16[si + 1];
        rgb16[di + 2] = rgba16[si + 2];
      }
    }
    return new Blob([writeTiff16RGB(rgb16, outW, outH)], { type: 'image/tiff' });
  }

  function tiffTo16RGBA(ifd, isLE) {
    const w = ifd.width, h = ifd.height;
    const bps = (ifd.t258 || [16])[0];
    const spp = (ifd.t277 || [3])[0];
    const data = ifd.data;
    const n = w * h;
    const out = new Uint16Array(n * 4);
    if (bps === 16) {
      for (let i = 0; i < n; i++) {
        const base = i * spp * 2;
        const rd = o => isLE ? (data[o] | (data[o + 1] << 8)) : ((data[o] << 8) | data[o + 1]);
        const r = spp >= 1 ? rd(base)     : 0;
        const g = spp >= 2 ? rd(base + 2) : r;
        const b = spp >= 3 ? rd(base + 4) : r;
        const a = spp >= 4 ? rd(base + 6) : 0xFFFF;
        out[i * 4] = r; out[i * 4 + 1] = g; out[i * 4 + 2] = b; out[i * 4 + 3] = a;
      }
    } else if (bps === 8) {
      for (let i = 0; i < n; i++) {
        const base = i * spp;
        const r = data[base];
        const g = spp >= 2 ? data[base + 1] : r;
        const b = spp >= 3 ? data[base + 2] : r;
        const a = spp >= 4 ? data[base + 3] : 0xFF;
        out[i * 4]     = (r << 8) | r;
        out[i * 4 + 1] = (g << 8) | g;
        out[i * 4 + 2] = (b << 8) | b;
        out[i * 4 + 3] = (a << 8) | a;
      }
    } else {
      throw new Error('Unsupported TIFF bit depth: ' + bps);
    }
    return out;
  }

  function writeTiff16RGB(rgb16, w, h) {
    const tagCount = 13;
    const bpsOffset  = 8;
    const xResOffset = bpsOffset + 6;
    const yResOffset = xResOffset + 8;
    const ifdOffset  = yResOffset + 8;
    const ifdSize    = 2 + tagCount * 12 + 4;
    const pxOffset   = ifdOffset + ifdSize;
    const stripBytes = w * h * 3 * 2;

    const buf = new ArrayBuffer(pxOffset + stripBytes);
    const dv  = new DataView(buf);
    const u8  = new Uint8Array(buf);

    u8[0] = 0x49; u8[1] = 0x49;
    dv.setUint16(2, 42, true);
    dv.setUint32(4, ifdOffset, true);

    dv.setUint16(bpsOffset,     16, true);
    dv.setUint16(bpsOffset + 2, 16, true);
    dv.setUint16(bpsOffset + 4, 16, true);

    dv.setUint32(xResOffset,     300, true); dv.setUint32(xResOffset + 4, 1, true);
    dv.setUint32(yResOffset,     300, true); dv.setUint32(yResOffset + 4, 1, true);

    let p = ifdOffset;
    dv.setUint16(p, tagCount, true); p += 2;

    const T_SHORT = 3, T_LONG = 4, T_RATIONAL = 5;
    const entry = (tag, type, count, value) => {
      dv.setUint16(p, tag, true);
      dv.setUint16(p + 2, type, true);
      dv.setUint32(p + 4, count, true);
      dv.setUint32(p + 8, value, true);
      p += 12;
    };

    entry(256, T_LONG,     1, w);
    entry(257, T_LONG,     1, h);
    entry(258, T_SHORT,    3, bpsOffset);
    entry(259, T_SHORT,    1, 1);
    entry(262, T_SHORT,    1, 2);
    entry(273, T_LONG,     1, pxOffset);
    entry(277, T_SHORT,    1, 3);
    entry(278, T_LONG,     1, h);
    entry(279, T_LONG,     1, stripBytes);
    entry(282, T_RATIONAL, 1, xResOffset);
    entry(283, T_RATIONAL, 1, yResOffset);
    entry(284, T_SHORT,    1, 1);
    entry(296, T_SHORT,    1, 2);
    dv.setUint32(p, 0, true);

    for (let i = 0; i < rgb16.length; i++) {
      dv.setUint16(pxOffset + i * 2, rgb16[i], true);
    }
    return buf;
  }

  async function exportJpeg(sx, sy, sw, sh, pad) {
    const c = document.createElement('canvas');
    c.width  = sw + pad * 2;
    c.height = sh + pad * 2;
    const cx = c.getContext('2d');
    cx.imageSmoothingEnabled = false;
    if (pad) { cx.fillStyle = '#ffffff'; cx.fillRect(0, 0, c.width, c.height); }
    cx.drawImage(source.preview, sx, sy, sw, sh, pad, pad, sw, sh);
    return await new Promise(r => c.toBlob(r, 'image/jpeg', 0.97));
  }

  // Init
  resizeCanvas();
  render();
})();
</script>
</body>
</html>
